services:
  postgres:
    image: postgres:16
    container_name: dotnet-mastery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dotnet_mastery}
      POSTGRES_USER: ${POSTGRES_USER:-dotnet_mastery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dotnet_mastery} -d ${POSTGRES_DB:-dotnet_mastery}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
